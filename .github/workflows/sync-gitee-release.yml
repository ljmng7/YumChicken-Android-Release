name: Sync release to Gitee

on:
  release:
    types:
      - published
      - edited
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to sync. Defaults to the latest GitHub release unless syncing all releases.
        required: false
        type: string
      sync_all_releases:
        description: Sync every published GitHub release to Gitee.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GITEE_REPOSITORY: ljmng7/YumChicken-Android-Release
      GITEE_TARGET_COMMITISH: main
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Validate required secrets
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
        run: |
          if [[ -z "$GITEE_ACCESS_TOKEN" ]]; then
            echo "::error::GITEE_ACCESS_TOKEN is not configured"
            exit 1
          fi

      - name: Resolve releases
        id: releases
        env:
          TAG_NAME: ${{ inputs.tag_name || github.event.release.tag_name }}
          SYNC_ALL_RELEASES: ${{ inputs.sync_all_releases || false }}
        run: |
          set -euo pipefail

          releases_file="$(mktemp)"

          if [[ "$SYNC_ALL_RELEASES" == "true" ]]; then
            gh release list \
              --repo "$GITHUB_REPOSITORY" \
              --limit 1000 \
              --json tagName,isDraft \
              --jq '.[] | select(.isDraft | not) | .tagName' > "$releases_file"
          elif [[ -n "${TAG_NAME:-}" ]]; then
            printf '%s\n' "$TAG_NAME" > "$releases_file"
          else
            gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq '.tagName' > "$releases_file"
          fi

          if [[ ! -s "$releases_file" ]]; then
            echo "::error::No GitHub releases were found to sync"
            exit 1
          fi

          echo "releases_file=$releases_file" >> "$GITHUB_OUTPUT"

      - name: Sync Gitee releases
        env:
          RELEASES_FILE: ${{ steps.releases.outputs.releases_file }}
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          gitee_owner="${GITEE_REPOSITORY%%/*}"
          gitee_repo="${GITEE_REPOSITORY#*/}"
          gitee_api="https://gitee.com/api/v5/repos/${gitee_owner}/${gitee_repo}"

          gitee_request() {
            curl --fail-with-body --silent --show-error --connect-timeout 30 --max-time 300 \
              -H "Accept: application/json" \
              "$@"
          }

          gitee_upload() {
            curl --fail-with-body --silent --show-error --location --http1.1 \
              --retry 2 --retry-delay 30 --retry-all-errors \
              --connect-timeout 60 --max-time 7200 \
              -H "Accept: application/json" \
              "$@"
          }

          sync_release() {
            local tag_name="$1"
            local work_dir body_file release_json release_name release_id existing_files file file_name

            echo "::group::Sync ${tag_name}"
            work_dir="$(mktemp -d)"
            body_file="${work_dir}/release-body.md"

            release_json="$(gh release view "$tag_name" --repo "$GITHUB_REPOSITORY" --json body,name,tagName)"
            release_name="$(jq -r 'if .name == null or .name == "" then .tagName else .name end' <<<"$release_json")"
            jq -r '.body // ""' <<<"$release_json" > "$body_file"

            mkdir -p "${work_dir}/dist"
            gh release download "$tag_name" \
              --repo "$GITHUB_REPOSITORY" \
              --dir "${work_dir}/dist" \
              --clobber

            if ! compgen -G "${work_dir}/dist/*" >/dev/null; then
              echo "::error::GitHub release ${tag_name} has no downloadable assets"
              exit 1
            fi

            release_json="$(
              gitee_request \
                -G \
                --data-urlencode "access_token=${GITEE_ACCESS_TOKEN}" \
                "${gitee_api}/releases/tags/${tag_name}" || true
            )"
            release_id="$(jq -r '.id // empty' <<<"$release_json")"

            if [[ -z "$release_id" ]]; then
              release_json="$(
                gitee_request \
                  -X POST \
                  -F "access_token=${GITEE_ACCESS_TOKEN}" \
                  -F "tag_name=${tag_name}" \
                  -F "name=${release_name}" \
                  -F "body=<${body_file}" \
                  -F "target_commitish=${GITEE_TARGET_COMMITISH}" \
                  "${gitee_api}/releases"
              )"
              release_id="$(jq -r '.id // empty' <<<"$release_json")"
            fi

            if [[ -z "$release_id" ]]; then
              echo "::error::Unable to resolve Gitee release id for ${tag_name}"
              exit 1
            fi

            existing_files="$(
              gitee_request \
                -G \
                --data-urlencode "access_token=${GITEE_ACCESS_TOKEN}" \
                "${gitee_api}/releases/${release_id}/attach_files"
            )"

            for file in "${work_dir}"/dist/*; do
              file_name="$(basename "$file")"
              echo "Uploading ${file_name} ($(wc -c < "$file") bytes) to Gitee release ${tag_name}"

              jq -r --arg name "$file_name" '.[] | select(.name == $name) | .id' <<<"$existing_files" |
                while read -r attach_file_id; do
                  [[ -z "$attach_file_id" ]] && continue
                  gitee_request \
                    -X DELETE \
                    -G \
                    --data-urlencode "access_token=${GITEE_ACCESS_TOKEN}" \
                    "${gitee_api}/releases/${release_id}/attach_files/${attach_file_id}" >/dev/null
                done

              gitee_upload \
                -X POST \
                -F "access_token=${GITEE_ACCESS_TOKEN}" \
                -F "file=@${file}" \
                "${gitee_api}/releases/${release_id}/attach_files" >/dev/null

              echo "Uploaded ${file_name}"
            done

            echo "::endgroup::"
          }

          while read -r tag_name; do
            [[ -z "$tag_name" ]] && continue
            sync_release "$tag_name"
          done < "$RELEASES_FILE"
